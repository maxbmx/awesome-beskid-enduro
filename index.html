  <script>
(function () {
  var STORAGE_KEY = 'beskid-enduro-favorite-routes';

  function getFavorites() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      var arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch (e) {
      return [];
    }
  }

  function setFavorites(ids) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
  }

  function isFavorite(id) {
    return getFavorites().indexOf(id) !== -1;
  }

  function toggleFavorite(id) {
    var list = getFavorites();
    var i = list.indexOf(id);
    if (i === -1) list.push(id);
    else list.splice(i, 1);
    setFavorites(list);
    return i === -1;
  }

  function routeId(entry) {
    return entry.file;
  }

  function displayTitle(entry) {
    var n = (entry.name || '').trim();
    if (!n || n === 'Untitled Document') {
      return entry.file.replace(/\.gpx$/i, '');
    }
    return n;
  }

  function formatDate(iso) {
    if (!iso) return '—';
    try {
      var d = new Date(iso);
      if (isNaN(d.getTime())) return '—';
      return d.toLocaleDateString('pl-PL', { day: 'numeric', month: 'long', year: 'numeric' });
    } catch (e) {
      return '—';
    }
  }

  function formatDistanceM(m) {
    if (m == null || !isFinite(m) || m < 0) return '—';
    if (m >= 1000) return (m / 1000).toFixed(1).replace('.', ',') + ' km';
    return Math.round(m) + ' m';
  }

  function formatElevM(m) {
    if (m == null || !isFinite(m) || m < 0) return '—';
    return new Intl.NumberFormat('pl-PL').format(Math.round(m)) + ' m';
  }

  /**
   * Podjazd w liczbie głównej tylko gdy jest sensowny (≥ 5 m) i zjazd nie dominuje
   * (np. Haneczka: ~8 m podjazdu vs ~358 m zjazdu — pokazujemy ↓, nie „8 m”).
   * Przy dużym podjeździe w tooltipie dopisujemy zjazd, jeśli jest większy.
   */
  function formatElevationStat(entry) {
    var MEANINGFUL_GAIN_M = 5;
    var g = entry.elevation_gain_m;
    var l = entry.elevation_loss_m;
    var hasG = typeof g === 'number' && isFinite(g);
    var hasL = typeof l === 'number' && isFinite(l);
    var gR = hasG ? Math.round(g) : 0;
    var lR = hasL ? Math.round(l) : 0;
    var dominantDescent = hasG && hasL && l > g * 4;

    if (hasG && g >= MEANINGFUL_GAIN_M && !dominantDescent) {
      var t = 'Przewyższenie (suma podjazdów)';
      if (hasL && lR > 0 && lR > gR) {
        t += '. Zjazd ok. ' + lR + ' m (suma spadków).';
      }
      return { text: formatElevM(g), title: t };
    }
    if (hasL && l > 0) {
      var tDown = 'Zjazd (suma spadków)';
      if (dominantDescent && gR > 0) {
        tDown += '. Drobne podjazdy w sumie ok. ' + gR + ' m (GPS).';
      }
      return {
        text: '↓ ' + new Intl.NumberFormat('pl-PL').format(lR) + ' m',
        title: tDown,
      };
    }
    if (hasG && g > 0) {
      return { text: formatElevM(g), title: 'Przewyższenie (suma podjazdów, poniżej ' + MEANINGFUL_GAIN_M + ' m)' };
    }
    if (hasG && hasL && g === 0 && l === 0) {
      return { text: '0 m', title: 'Bez zmiany wysokości' };
    }
    if (hasG && g === 0) {
      return { text: '0 m', title: 'Brak podjazdu w profilu' };
    }
    return { text: '—', title: '' };
  }

  function hasManifestElevation(entry) {
    if (!entry) return false;
    return (
      (typeof entry.elevation_gain_m === 'number' && isFinite(entry.elevation_gain_m)) ||
      (typeof entry.elevation_loss_m === 'number' && isFinite(entry.elevation_loss_m))
    );
  }

  function gpxUrl(entry) {
    return 'routes/' + encodeURIComponent(entry.file);
  }

  function iconBike() {
    return '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><circle cx="18.5" cy="17.5" r="3.5"/><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="15" cy="5" r="1"/><path d="M12 17.5V14l-3-3 4-3 2 3h2"/></svg>';
  }
  function iconMountain() {
    return '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><path d="m8 3 4 8 5-5 5 15H2L8 3z"/></svg>';
  }
  function iconStar(filled) {
    if (filled) {
      return '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="#f97316" stroke="#f97316" stroke-width="1.5" class="shrink-0"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
    }
    return '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" class="shrink-0"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
  }
  function iconDownload() {
    return '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-500"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
  }

  function renderCard(entry) {
    var id = routeId(entry);
    var title = displayTitle(entry);
    var dateStr = formatDate(entry.date);
    var elevStat = formatElevationStat(entry);
    var fav = isFavorite(id);
    var wrap = document.createElement('article');
    wrap.className = 'route-card flex flex-col overflow-hidden rounded-xl border border-slate-100 bg-white shadow-card';
    wrap.dataset.file = entry.file;
    wrap.innerHTML =
      '<div class="map-host relative h-52 w-full bg-slate-100">' +
        '<div class="map-skeleton absolute inset-0 animate-pulse bg-gradient-to-br from-slate-100 to-slate-200"></div>' +
        '<div class="map-el h-full w-full opacity-0 transition-opacity duration-300"></div>' +
      '</div>' +
      '<div class="flex flex-1 flex-col p-4">' +
        '<div class="mb-2 flex items-start justify-between gap-2">' +
          '<time class="text-xs text-slate-400" datetime="' + (entry.date || '') + '">' + escapeHtml(dateStr) + '</time>' +
          '<div class="flex shrink-0 items-center gap-2">' +
            '<button type="button" class="star-btn rounded-md p-1.5 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-accent/40" aria-label="Ulubiona trasa" aria-pressed="' + fav + '">' + iconStar(fav) + '</button>' +
            '<a class="menu-dl inline-flex items-center gap-1 rounded-md px-2 py-1 text-xs font-medium uppercase tracking-wide text-slate-600 hover:bg-slate-50 hover:text-slate-800 focus:outline-none focus:ring-2 focus:ring-accent/40" href="#" download>' + iconDownload() + '<span>.GPX</span></a>' +
          '</div>' +
        '</div>' +
        '<h2 class="mb-3 line-clamp-2 text-base font-semibold leading-snug text-slate-900">' + escapeHtml(title) + '</h2>' +
        '<div class="mt-auto flex flex-wrap items-center gap-x-4 gap-y-1 text-xs text-slate-600">' +
          '<span class="stat-dist inline-flex items-center gap-1.5" title="Dystans">' + iconBike() + '<span class="font-medium tabular-nums text-slate-700">—</span></span>' +
          '<span class="stat-elev inline-flex items-center gap-1.5" title="' +
          (elevStat.title ? escapeHtml(elevStat.title) : '') +
          '">' +
          iconMountain() +
          '<span class="font-medium tabular-nums text-slate-700">' +
          elevStat.text +
          '</span></span>' +
        '</div>' +
      '</div>';

    var starBtn = wrap.querySelector('.star-btn');
    var aDl = wrap.querySelector('.menu-dl');
    var url = gpxUrl(entry);
    aDl.href = url;
    aDl.setAttribute('download', entry.file);

    starBtn.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      var on = toggleFavorite(id);
      starBtn.setAttribute('aria-pressed', on);
      starBtn.innerHTML = iconStar(on);
    });

    return wrap;
  }

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function initMapForCard(card, entry) {
    if (typeof L === 'undefined' || typeof L.GPX !== 'function') {
      console.error('Leaflet lub leaflet-gpx niedostępne');
      return;
    }
    var mapEl = card.querySelector('.map-el');
    var skel = card.querySelector('.map-skeleton');
    if (!mapEl || mapEl.dataset.inited === '1') return;
    mapEl.dataset.inited = '1';

    var url = gpxUrl(entry);
    fetch(url)
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
      })
      .then(function (xmlText) {
        var map = L.map(mapEl, {
          zoomControl: false,
          attributionControl: true,
          scrollWheelZoom: false,
          dragging: true,
          boxZoom: false,
          keyboard: false,
          doubleClickZoom: false,
        });

        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
          maxZoom: 17,
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> · <a href="https://opentopomap.org">OpenTopoMap</a>',
        }).addTo(map);

        var blob = new Blob([xmlText], { type: 'application/gpx+xml' });
        var blobUrl = URL.createObjectURL(blob);

        var gpxLayer = new L.GPX(blobUrl, {
          async: true,
          polyline_options: {
            color: '#f97316',
            weight: 4,
            opacity: 0.92,
            lineCap: 'round',
            lineJoin: 'round',
          },
          marker_options: {
            startIconUrl: '',
            endIconUrl: '',
            shadowUrl: '',
          },
        });

        gpxLayer.on('loaded', function (e) {
          var gpx = e.target;
          var dist = gpx.get_distance();
          var gain = gpx.get_elevation_gain();

          var distEl = card.querySelector('.stat-dist span:last-child');
          var elevEl = card.querySelector('.stat-elev span:last-child');
          if (distEl) distEl.textContent = formatDistanceM(dist);
          if (elevEl && !hasManifestElevation(entry)) {
            elevEl.textContent = formatElevM(gain);
          }

          var b = gpx.getBounds();
          if (b.isValid()) {
            map.fitBounds(b, { padding: [18, 18], maxZoom: 15 });
          } else {
            map.setView([49.78, 19.12], 13);
          }
          if (skel) skel.remove();
          mapEl.classList.remove('opacity-0');
          map.invalidateSize();
          setTimeout(function () {
            map.invalidateSize();
          }, 80);
        });

        gpxLayer.on('error', function () {
          if (skel) skel.remove();
          map.remove();
          mapEl.innerHTML =
            '<div class="flex h-full items-center justify-center bg-slate-100 px-2 text-center text-xs text-slate-500">Nie udało się wczytać GPX</div>';
        });

        gpxLayer.addTo(map);
      })
      .catch(function () {
        if (skel) skel.remove();
        mapEl.innerHTML =
          '<div class="flex h-full items-center justify-center bg-slate-100 px-2 text-center text-xs text-slate-500">Błąd pobierania trasy</div>';
      });
  }

  function observeCards(entries) {
    var io = new IntersectionObserver(
      function (items) {
        items.forEach(function (it) {
          if (!it.isIntersecting) return;
          var card = it.target;
          var file = card.dataset.file;
          var entry = entries.find(function (e) {
            return e.file === file;
          });
          if (entry) initMapForCard(card, entry);
          io.unobserve(card);
        });
      },
      { rootMargin: '140px 0px', threshold: 0.02 }
    );

    document.querySelectorAll('.route-card').forEach(function (c) {
      io.observe(c);
    });
  }

  function loadRoutesManifest() {
    var el = document.getElementById('routes-data');
    if (el && el.textContent.trim()) {
      try {
        var parsed = JSON.parse(el.textContent);
        if (Array.isArray(parsed) && parsed.length > 0) {
          return Promise.resolve(parsed);
        }
      } catch (e) {
        return Promise.reject(e);
      }
    }
    return fetch('routes-manifest.json', { cache: 'no-store' }).then(function (r) {
      if (!r.ok) throw new Error('Nie znaleziono routes-manifest.json (HTTP ' + r.status + ')');
      return r.json();
    });
  }

  loadRoutesManifest()
    .then(function (entries) {
      var grid = document.getElementById('grid');
      var countEl = document.getElementById('route-count');
      if (countEl) countEl.textContent = entries.length + (entries.length === 1 ? ' trasa' : ' tras');
      entries.forEach(function (entry) {
        grid.appendChild(renderCard(entry));
      });
      observeCards(entries);
    })
    .catch(function (err) {
      var b = document.getElementById('error-banner');
      if (b) {
        b.classList.remove('hidden');
        b.textContent =
          'Nie udało się wczytać listy tras. Uruchom: python3 scripts/generate_routes_manifest.py (wstawia dane do index.html). Przy otwieraniu pliku z dysku (file://) przeglądarka często blokuje ładowanie GPX — użyj hostingu statycznego (np. GitHub Pages) lub lokalnego serwera HTTP. ' +
          (err && err.message ? err.message : err);
      }
    });
})();
  </script>
</body>
</html>
